version: '3.8'

services:
  omr-service:
    build: .
    container_name: cadenza-omr
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - GUNICORN_TIMEOUT=300
      - GUNICORN_WORKERS=2
    command: gunicorn -b 0.0.0.0:8080 -w 2 --timeout 600 --graceful-timeout 300 server:app